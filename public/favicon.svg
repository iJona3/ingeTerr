<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background -->
  <rect width="64" height="64" fill="#1a1a1a"/>
  
  <!-- Crown above house (3 peaks) -->
  <polygon points="20,22 26,14 32,20 38,14 44,20 44,26 20,26" fill="#C9A84C"/>
  
  <!-- House body -->
  <rect x="20" y="26" width="24" height="20" fill="#C9A84C"/>
  
  <!-- Door -->
  <rect x="27" y="36" width="10" height="10" rx="5" ry="0" fill="#1a1a1a"/>

  <!-- Small horizontal accent line (ground) -->
  <rect x="14" y="46" width="36" height="2" rx="1" fill="#C9A84C" opacity="0.5"/>
</svg>
